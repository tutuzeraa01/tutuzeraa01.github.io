<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Rosado Enterprise</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0d0d0d;
  color:white;
  overflow-x:hidden;
}

/* HEADER */
header{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  width:100%;
  z-index:100;
}

nav button{
  margin:0 5px;
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:#1c1c1c;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

nav button:hover{
  background:#ff2b2b;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(to bottom, #000, #111);
  animation:fadeIn 1.5s ease;
}

.hero h1{
  font-size:50px;
  color:#ff2b2b;
  letter-spacing:3px;
  animation:slideDown 1s ease;
}

.hero p{
  max-width:600px;
  color:#ccc;
  animation:fadeIn 2s ease;
}

.hero button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff2b2b;
  color:white;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

.hero button:hover{
  transform:scale(1.1);
}

/* PAGES */
.page{
  display:none;
  padding:100px 20px 20px;
  animation:fadeIn 0.5s ease;
}

.active{display:block;}

h2{
  text-align:center;
  color:#ff2b2b;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px) scale(1.03);
}

/* BUTTON */
.btn{
  background:#ff2b2b;
  border:none;
  padding:10px;
  width:100%;
  color:white;
  margin-top:10px;
  cursor:pointer;
  border-radius:10px;
}

/* CART */
.item{
  background:#1c1c1c;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
}

/* ADMIN */
.admin{
  background:#1c1c1c;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

.status{
  background:#333;
  padding:5px;
  border-radius:5px;
  display:inline-block;
}

/* ANIMAÇÕES */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes slideDown{
  from{transform:translateY(-30px); opacity:0;}
  to{transform:translateY(0); opacity:1;}
}
</style>
</head>

<body>

<header>
  <h3>🌮 El Rosado</h3>
  <nav>
    <button onclick="show('home')">Home</button>
    <button onclick="show('menu')">Menu</button>
    <button onclick="show('cart')">Carrinho</button>
    <button onclick="show('login')">Login</button>
    <button onclick="show('admin')">Admin</button>
  </nav>
</header>

<!-- HERO -->
<div id="home" class="page active hero">
  <h1>El Rosado</h1>
  <p>
    Uma experiência gastronômica que une tradição mexicana com tecnologia moderna.
  </p>
  <button onclick="show('menu')">🍽️ Pedir Agora</button>
</div>

<!-- MENU -->
<div id="menu" class="page">
  <h2>Cardápio</h2>
  <div class="grid">

    <div class="card">
      <h3>Taco</h3>
      <p>R$ 18</p>
      <button class="btn" onclick="add('Taco',18)">Adicionar</button>
    </div>

    <div class="card">
      <h3>Burrito</h3>
      <p>R$ 25</p>
      <button class="btn" onclick="add('Burrito',25)">Adicionar</button>
    </div>

    <div class="card">
      <h3>Nachos</h3>
      <p>R$ 20</p>
      <button class="btn" onclick="add('Nachos',20)">Adicionar</button>
    </div>

  </div>
</div>

<!-- CART -->
<div id="cart" class="page">
  <h2>Carrinho</h2>
  <div id="cartItems"></div>
  <h3>Total: R$ <span id="total">0</span></h3>
  <button class="btn" onclick="checkout()">Finalizar Pedido</button>
</div>

<!-- LOGIN -->
<div id="login" class="page">
  <h2>Login</h2>
  <input id="user" placeholder="Nome" style="padding:10px;width:100%;">
  <button class="btn" onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>Painel</h2>
  <div id="orders"></div>
</div>

<script>
let cart = [];
let total = 0;
let user = "";

/* NAV */
function show(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById(p).classList.add('active');

  if(p==="cart") renderCart();
  if(p==="admin") renderOrders();
}

/* LOGIN */
function login(){
  user = document.getElementById("user").value;
  alert("Bem-vindo " + user);
}

/* ADD */
function add(name,price){
  cart.push({name,price});
  total += price;
  alert(name+" adicionado!");
}

/* CART */
function renderCart(){
  let div = document.getElementById("cartItems");
  div.innerHTML = "";

  cart.forEach((c,i)=>{
    div.innerHTML += `
      <div class="item">
        ${c.name} - R$ ${c.price}
        <button onclick="remove(${i})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function remove(i){
  total -= cart[i].price;
  cart.splice(i,1);
  renderCart();
}

/* CHECKOUT */
function checkout(){
  if(!user){
    alert("Faça login primeiro");
    return;
  }

  if(cart.length===0){
    alert("Carrinho vazio");
    return;
  }

  let orders = JSON.parse(localStorage.getItem("orders")||"[]");

  let order = {
    id: Date.now(),
    user:user,
    items:cart,
    total:total,
    status:"🕐 Recebido"
  };

  orders.push(order);
  localStorage.setItem("orders",JSON.stringify(orders));

  cart=[];
  total=0;

  alert("Pedido enviado!");
  show("menu");
}

/* ADMIN */
function renderOrders(){
  let orders = JSON.parse(localStorage.getItem("orders")||"[]");
  let div = document.getElementById("orders");

  div.innerHTML="";

  orders.forEach((o,i)=>{
    div.innerHTML += `
      <div class="admin">
        <b>${o.user}</b><br>
        ${o.items.map(x=>x.name).join(", ")}<br>
        Total: R$ ${o.total}<br>
        <div class="status">${o.status}</div><br><br>

        <button onclick="update(${i},'👨‍🍳 Preparando')">Preparar</button>
        <button onclick="update(${i},'🚚 Saiu')">Saiu</button>
        <button onclick="update(${i},'✅ Entregue')">Entregue</button>
      </div>
    `;
  });
}

function update(i,status){
  let orders = JSON.parse(localStorage.getItem("orders"));
  orders[i].status = status;
  localStorage.setItem("orders",JSON.stringify(orders));
  renderOrders();
}
</script>

</body>
</html>
