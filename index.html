<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Rosado</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0d0d0d;
  color:white;
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  background:#000;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  z-index:10;
}

nav button{
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#222;
  color:white;
  cursor:pointer;
}

/* PAGES */
.page{display:none;padding:100px 20px;}
.active{display:block;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.btn{
  background:#ff2b2b;
  border:none;
  padding:10px;
  width:100%;
  color:white;
  margin-top:10px;
  border-radius:10px;
  cursor:pointer;
}

/* CARRINHO */
.cart{
  position:fixed;
  right:-350px;
  top:0;
  width:320px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

.cart.open{right:0;}

.item{
  background:#222;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

.qty{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}

.qty button{
  background:#ff2b2b;
  border:none;
  color:white;
  padding:5px 10px;
  border-radius:5px;
}

/* FORM */
input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

/* BOTÃO FLUTUANTE */
.cart-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff2b2b;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h3>🌮 El Rosado</h3>
  <nav>
    <button onclick="show('menu')">Menu</button>
    <button onclick="show('staff')">Equipe</button>
  </nav>
</header>

<!-- MENU -->
<div id="menu" class="page active">
  <h2>Cardápio</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1617196038435-3c1a5c3e1f2f">
      <h3>Taco</h3>
      <button class="btn" onclick="add('Taco',18)">Adicionar</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
      <h3>Burrito</h3>
      <button class="btn" onclick="add('Burrito',25)">Adicionar</button>
    </div>

  </div>
</div>

<!-- STAFF -->
<div id="staff" class="page">
  <h2>Equipe</h2>
  <p>Recepcionista: Isadora</p>
  <p>Marketing: Pietro</p>
  <p>Caixa: Arthur</p>
  <p>Garçom: Jorge</p>
  <p>Cozinha: Iago Kny, Vithor</p>
  <p>Bar: Murilo</p>
  <p>Estoque/Limpeza: Manu</p>
  <p>Gerência: Ana</p>
</div>

<!-- CARRINHO -->
<div class="cart" id="cart">
  <h2>Pedido</h2>
  <div id="cartItems"></div>

  <h3>Total: R$ <span id="total">0</span></h3>

  <h4>Seus dados</h4>
  <input id="nome" placeholder="Seu nome">
  <input id="endereco" placeholder="Endereço">

  <button class="btn" onclick="finalizar()">Finalizar Pedido</button>
</div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<script>
let cart={};

function show(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

function add(name,price){
  if(!cart[name]){
    cart[name]={price:price,qty:1};
  }else{
    cart[name].qty++;
  }
  render();
}

function change(name,delta){
  cart[name].qty+=delta;
  if(cart[name].qty<=0) delete cart[name];
  render();
}

function render(){
  let div=document.getElementById("cartItems");
  div.innerHTML="";
  let total=0;

  for(let item in cart){
    let c=cart[item];
    total+=c.price*c.qty;

    div.innerHTML+=`
      <div class="item">
        ${item} - R$${c.price}
        <div class="qty">
          <button onclick="change('${item}',-1)">-</button>
          ${c.qty}
          <button onclick="change('${item}',1)">+</button>
        </div>
      </div>
    `;
  }

  document.getElementById("total").innerText=total;
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

function finalizar(){
  let nome=document.getElementById("nome").value;
  let end=document.getElementById("endereco").value;

  if(!nome || !end){
    alert("Preencha seus dados!");
    return;
  }

  let msg=`Pedido%0ACliente: ${nome}%0AEndereço: ${end}%0A`;
  let total=0;

  for(let item in cart){
    let c=cart[item];
    total+=c.price*c.qty;
    msg+=`${item} x${c.qty} - R$${c.price*c.qty}%0A`;
  }

  msg+=`Total: R$${total}`;

  window.open("https://wa.me/5599999999999?text="+msg);
}
</script>

</body>
</html>
