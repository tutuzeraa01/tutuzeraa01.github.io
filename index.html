<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Rosado</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#0a0a0a;color:#fff}

/* HEADER */
header{
position:fixed;width:100%;background:#000000cc;
display:flex;justify-content:space-between;
padding:12px 20px;z-index:10
}

nav button{
background:#222;color:#fff;border:none;
padding:8px 12px;margin:5px;border-radius:20px;
cursor:pointer
}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=1200') center/cover;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
text-align:center
}

/* PAGE */
.page{display:none;padding:100px 20px}
.active{display:block}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px
}

/* CARD */
.card{
background:#111;padding:15px;border-radius:15px;
transition:.3s
}
.card:hover{transform:translateY(-8px)}

.card img{
width:100%;height:160px;object-fit:cover;
border-radius:10px
}

/* BUTTON */
.btn{
background:#ff3b3b;border:none;
padding:10px;width:100%;
color:#fff;border-radius:10px;cursor:pointer
}

/* SEARCH */
#search{
width:100%;padding:10px;margin:20px 0;
border:none;border-radius:10px
}

/* CART */
.cart{
position:fixed;right:-320px;top:0;
width:300px;height:100%;
background:#111;padding:20px;
transition:.3s;overflow:auto
}
.cart.open{right:0}

.cart-btn{
position:fixed;bottom:20px;right:20px;
background:red;padding:15px;border-radius:50%;
cursor:pointer
}

.count{
position:absolute;top:-5px;right:-5px;
background:#fff;color:#000;padding:3px 6px;
border-radius:50%;font-size:12px
}

/* TOAST */
.toast{
position:fixed;bottom:80px;right:20px;
background:#111;padding:10px 20px;
border-radius:10px;opacity:0;
transition:.3s
}
.toast.show{opacity:1}

input,select{
width:100%;padding:8px;margin:5px 0;
border:none;border-radius:8px
}
</style>
</head>

<body>

<header>
<h3>🌮 El Rosado</h3>
<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('menu')">Menu</button>
<button onclick="show('equipe')">Equipe</button>
</nav>
</header>

<!-- HOME -->
<div id="home" class="page active hero">
<h1>El Rosado</h1>
<p>Experiência mexicana premium</p>
<button class="btn" onclick="show('menu')">Ver Cardápio</button>
</div>

<!-- MENU -->
<div id="menu" class="page">

<input id="search" placeholder="🔍 Buscar..." onkeyup="buscar()">

<h2>🍽️ Pratos</h2>
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1617196038435-0a0d9c9a7c8d?w=800">
<h3>Taco</h3>
<button class="btn" onclick="add('Taco',18)">Adicionar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1601924928376-7b1d3b9fbb5c?w=800">
<h3>Quesadilla</h3>
<button class="btn" onclick="add('Quesadilla',22)">Adicionar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?w=800">
<h3>Burrito</h3>
<button class="btn" onclick="add('Burrito',25)">Adicionar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1582169296194-e4d644c48063?w=800">
<h3>Nachos</h3>
<button class="btn" onclick="add('Nachos',20)">Adicionar</button>
</div>

</div>

<h2>🥤 Bebidas</h2>
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1582450871972-ab5ca641643d?w=800">
<h3>Refrigerante</h3>
<button class="btn" onclick="add('Refrigerante',8)">Adicionar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1577805947697-89e18249d767?w=800">
<h3>Suco</h3>
<button class="btn" onclick="add('Suco',10)">Adicionar</button>
</div>

</div>

</div>

<!-- EQUIPE -->
<div id="equipe" class="page">
<h2>👥 Equipe</h2>
<div class="grid">
<div class="card">Isadora</div>
<div class="card">Pietro</div>
<div class="card">Arthur</div>
<div class="card">Jorge</div>
<div class="card">Iago / Vithor</div>
<div class="card">Murilo</div>
<div class="card">Manu</div>
<div class="card">Ana</div>
</div>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h2>Pedido</h2>
<div id="cartItems"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<input id="nome" placeholder="Nome">
<input id="endereco" placeholder="Endereço">

<select id="pagamento">
<option>Pagamento</option>
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button class="btn" onclick="finalizar()">Finalizar</button>
</div>

<div class="cart-btn" onclick="toggleCart()">
🛒 <span class="count" id="count">0</span>
</div>

<div class="toast" id="toast">Adicionado!</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || {};

// navegação
function show(p){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

// adicionar
function add(name,price){
if(!cart[name]) cart[name]={price,qty:1};
else cart[name].qty++;

showToast();
render();
}

// render
function render(){
let div=document.getElementById("cartItems");
div.innerHTML="";
let total=0,count=0;

for(let item in cart){
let c=cart[item];
total+=c.price*c.qty;
count+=c.qty;

div.innerHTML+=`
<div>
${item} x${c.qty}
<button onclick="mais('${item}')">+</button>
<button onclick="menos('${item}')">-</button>
</div>`;
}

document.getElementById("total").innerText=total;
document.getElementById("count").innerText=count;

localStorage.setItem("cart",JSON.stringify(cart));
}

function mais(i){cart[i].qty++;render();}
function menos(i){cart[i].qty--;if(cart[i].qty<=0) delete cart[i];render();}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function buscar(){
let t=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(t)?"block":"none";
});
}

function showToast(){
let t=document.getElementById("toast");
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

function finalizar(){
let nome=document.getElementById("nome").value;
let endereco=document.getElementById("endereco").value;

let msg="Pedido El Rosado\n\n";
for(let item in cart){
let c=cart[item];
msg+=`${item} x${c.qty}\n`;
}

window.open("https://wa.me/5599999999999?text="+encodeURIComponent(msg));
}

render();
</script>

</body>
</html>
