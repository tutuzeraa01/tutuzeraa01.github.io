<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Rosado</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

header h3{
  font-family:'Playfair Display';
  color:#ff3b3b;
}

nav button{
  margin:5px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#1c1c1c;
  color:white;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1604908176997-125f25cc6f3d') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:60px;
  font-family:'Playfair Display';
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#111;
  padding:15px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

/* BUTTON */
.btn{
  background:#ff3b3b;
  border:none;
  padding:10px;
  width:100%;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* SEARCH */
#search{
  width:100%;
  padding:10px;
  margin:20px 0;
  border-radius:10px;
  border:none;
}

/* CART */
.cart{
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
  overflow:auto;
}

.cart.open{right:0;}

.cart-btn{
  position:fixed;
  right:20px;
  bottom:20px;
  background:red;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}

.count{
  position:absolute;
  top:-5px;
  right:-5px;
  background:white;
  color:black;
  font-size:12px;
  padding:3px 6px;
  border-radius:50%;
}

input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<header>
  <h3>🌮 El Rosado</h3>
  <nav>
    <button onclick="show('home')">Home</button>
    <button onclick="show('menu')">Menu</button>
  </nav>
</header>

<!-- HOME -->
<div id="home" class="page hero">
  <h1>El Rosado</h1>
  <p>Experiência mexicana premium</p>
  <button class="btn" onclick="show('menu')">Ver Cardápio</button>
</div>

<!-- MENU -->
<div id="menu" class="page" style="display:none; padding:100px 20px;">

<input id="search" placeholder="🔍 Buscar..." onkeyup="buscar()">

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1617196038435-0a0d9c9a7c8d?w=800">
<h3>Taco</h3>
<button class="btn" onclick="add('Taco',18)">Adicionar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1601924928376-7b1d3b9fbb5c?w=800">
<h3>Quesadilla</h3>
<button class="btn" onclick="add('Quesadilla',22)">Adicionar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551504734-5ee1c4a1479b?w=800">
<h3>Burrito</h3>
<button class="btn" onclick="add('Burrito',25)">Adicionar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1582169296194-e4d644c48063?w=800">
<h3>Nachos</h3>
<button class="btn" onclick="add('Nachos',20)">Adicionar</button>
</div>

</div>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h2>Pedido</h2>
<div id="cartItems"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<input id="nome" placeholder="Nome">
<input id="endereco" placeholder="Endereço">

<select id="pagamento">
<option>Pagamento</option>
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<button class="btn" onclick="finalizar()">Finalizar</button>
</div>

<div class="cart-btn" onclick="toggleCart()">
🛒 <span class="count" id="count">0</span>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || {};

// navegar
function show(p){
  document.querySelectorAll('.page').forEach(e=>e.style.display="none");
  document.getElementById(p).style.display="block";
}

// adicionar
function add(name,price){
  if(!cart[name]) cart[name]={price,qty:1};
  else cart[name].qty++;

  render();
}

// render carrinho
function render(){
  let div=document.getElementById("cartItems");
  div.innerHTML="";
  let total=0;
  let count=0;

  for(let item in cart){
    let c=cart[item];
    total+=c.price*c.qty;
    count+=c.qty;

    div.innerHTML+=`
      <div style="margin:10px 0">
        ${item} x${c.qty}
        <br>
        <button onclick="mais('${item}')">+</button>
        <button onclick="menos('${item}')">-</button>
      </div>
    `;
  }

  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=count;

  localStorage.setItem("cart", JSON.stringify(cart));
}

// + -
function mais(item){
  cart[item].qty++;
  render();
}

function menos(item){
  cart[item].qty--;
  if(cart[item].qty<=0) delete cart[item];
  render();
}

// carrinho abrir
function toggleCart(){
  document.getElementById("cart").classList.toggle("open");
}

// buscar
function buscar(){
  let termo=document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(termo) ? "block":"none";
  });
}

// finalizar
function finalizar(){
  let nome = document.getElementById("nome").value;
  let endereco = document.getElementById("endereco").value;
  let pagamento = document.getElementById("pagamento").value;

  if(!nome || !endereco){
    alert("Preencha os dados!");
    return;
  }

  let msg = `Pedido El Rosado\n\n`;

  for(let item in cart){
    let c=cart[item];
    msg += `${item} x${c.qty} = R$ ${c.price*c.qty}\n`;
  }

  msg += `\nTotal: R$ ${document.getElementById("total").innerText}`;
  msg += `\nPagamento: ${pagamento}`;
  msg += `\nNome: ${nome}`;
  msg += `\nEndereço: ${endereco}`;

  let url = "https://wa.me/5599999999999?text=" + encodeURIComponent(msg);
  window.open(url);
}

render();
</script>

</body>
</html>
